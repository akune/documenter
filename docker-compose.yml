services:
  documenter:
    build: .
    image: documenter:latest
    container_name: documenter
    restart: unless-stopped
    
    volumes:
      # Input directory for scanned PDFs
      - ./input:/input
      # Output directory for processed PDFs (optional)
      - ./output:/output
      # Temporary processing directory (can use tmpfs for performance)
      - /tmp/documenter:/tmp/processing
    
    environment:
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      
      # OCR Settings
      - OCR_LANGUAGE=${OCR_LANGUAGE:-deu+eng}
      - OCR_DESKEW=${OCR_DESKEW:-true}
      - OCR_CLEAN=${OCR_CLEAN:-true}
      - OCR_ROTATE_PAGES=${OCR_ROTATE_PAGES:-true}
      
      # Blank page detection
      - BLANK_PAGE_REMOVAL=${BLANK_PAGE_REMOVAL:-true}
      - BLANK_PAGE_THRESHOLD=${BLANK_PAGE_THRESHOLD:-0.99}
      
      # QR code document splitting
      - SPLIT_QR_ENABLED=${SPLIT_QR_ENABLED:-true}
      - SPLIT_QR_CONTENT=${SPLIT_QR_CONTENT:-[dmsqrnd]}
      
      # Nextcloud settings
      - NEXTCLOUD_ENABLED=${NEXTCLOUD_ENABLED:-false}
      - NEXTCLOUD_URL=${NEXTCLOUD_URL:-}
      - NEXTCLOUD_USER=${NEXTCLOUD_USER:-}
      - NEXTCLOUD_PASSWORD=${NEXTCLOUD_PASSWORD:-}
      - NEXTCLOUD_TARGET_DIR=${NEXTCLOUD_TARGET_DIR:-/Documents/Scans}
      
      # Paperless-ngx settings
      - PAPERLESS_ENABLED=${PAPERLESS_ENABLED:-false}
      - PAPERLESS_URL=${PAPERLESS_URL:-}
      - PAPERLESS_API_TOKEN=${PAPERLESS_API_TOKEN:-}
      - PAPERLESS_DEFAULT_TAGS=${PAPERLESS_DEFAULT_TAGS:-Inbox}
      - PAPERLESS_GROUP=${PAPERLESS_GROUP:-}
      
      # Processing settings
      - DELETE_SOURCE=${DELETE_SOURCE:-true}
      - FILE_STABILITY_SECONDS=${FILE_STABILITY_SECONDS:-5}
      - POLL_INTERVAL=${POLL_INTERVAL:-1.0}
      
      # Output directory settings
      - OUTPUT_DIR_ENABLED=${OUTPUT_DIR_ENABLED:-false}
      - OUTPUT_DIR=${OUTPUT_DIR:-/output}
      - OUTPUT_DIR_USE_SUBFOLDERS=${OUTPUT_DIR_USE_SUBFOLDERS:-true}
    
    # Optional: Use host network if needed for local services
    # network_mode: host
    
    # Optional: Resource limits
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 2G
