services:

  paperless-redis:
    image: redis:7-alpine
    restart: "no"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: "no"
    depends_on:
      paperless-redis:
        condition: service_healthy
    ports:
      - "8010:8000"
    environment:
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_DBENGINE: sqlite
      PAPERLESS_ADMIN_USER: admin
      PAPERLESS_ADMIN_PASSWORD: admin
      PAPERLESS_ADMIN_MAIL: admin@test.local
      PAPERLESS_SECRET_KEY: test-secret-key-not-for-production
      PAPERLESS_OCR_LANGUAGE: eng
      PAPERLESS_CONSUMER_POLLING: 0
      PAPERLESS_TIKA_ENABLED: 0
      PAPERLESS_URL: http://localhost:8010
    healthcheck:
      test: ["CMD", "curl", "-fs", "-S", "--max-time", "2", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  nextcloud:
    image: nextcloud:latest
    restart: "no"
    ports:
      - "8011:80"
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      SQLITE_DATABASE: nextcloud
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  test-init:
    image: python:3.12-slim
    restart: "no"
    depends_on:
      paperless:
        condition: service_healthy
      nextcloud:
        condition: service_healthy
    environment:
      PAPERLESS_URL: http://paperless:8000
      PAPERLESS_ADMIN_USER: admin
      PAPERLESS_ADMIN_PASSWORD: admin
      NEXTCLOUD_URL: http://nextcloud
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
    volumes:
      - ./init:/init:ro
    command: >
      sh -c "pip install requests --quiet &&
             python /init/init_paperless.py &&
             python /init/init_nextcloud.py"
